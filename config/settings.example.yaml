# Character-Agent 配置

# ===== LLM 配置（用于 Mem0 记忆提取和对话推理） =====
llm:
  provider: xxx
  api_key: "xxx"
  base_url: "xx"

  memory_model: deepseek-v4-pro
  memory_temperature: 0.01
  memory_max_tokens: 1024

# ===== Embedding 配置（独立的嵌入模型服务） =====
embedder:
  provider: openai
  api_key: "xxx"
  base_url: "xxx"
  model: "xxx"
  embedding_dims: 1024
  
# ===== Qdrant 向量数据库 =====
qdrant:
  host: localhost
  port: 6333
  collection_name: character_agent
  embedding_dims: 1024  # 与 embedder.model 的输出维度一致

# ===== Mem0 搜索 =====
search:
  top_k: 5
  hybrid: true

# ===== 记忆标识符 =====
identifiers:
  agent_persona_suffix: "-persona"
  agent_work_suffix: "-work"
  interact_suffix: "-interact"


# ===== 短期记忆 =====
short_term:
  max_turns: 10
  token_limit: 4000


# ===== 日志 =====
logging:
  level: INFO
