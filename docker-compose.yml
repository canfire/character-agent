# Character-Agent - Memory Stack
# Qdrant 向量数据库（数据存储在本地项目目录 data/qdrant/）

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: character_agent_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
